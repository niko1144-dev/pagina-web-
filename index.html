<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Finalizar compra</h1>
        <p class="subtitle">Completa tus datos para procesar el pedido.</p>

        <form id="checkout-form" novalidate>
          <label for="nombre">Nombre completo</label>
          <input id="nombre" name="nombre" type="text" required minlength="3" />

          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" required />

          <label for="monto">Monto (USD)</label>
          <input id="monto" name="monto" type="number" step="0.01" min="1" required />

          <button type="submit" id="submit-btn">Pagar ahora</button>
        </form>

        <pre id="result" aria-live="polite"></pre>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
